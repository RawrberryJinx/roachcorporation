<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCO — Employee Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a16;
    --bg2: #0b1020;
    --bg3: #111730;
    --ink: #c8cad4;
    --ink2: #8a8fa3;
    --ink3: #4e5470;
    --red: #a8322a;
    --red2: #cf4038;
    --red-glow: rgba(168,50,42,0.15);
    --border: rgba(200,202,212,0.08);
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--display);
    font-size: 15px;
    line-height: 1.6;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.3;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  /* Subtle radial glow behind center */
  .login-backdrop {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 50% 45%, var(--red-glow), transparent),
      radial-gradient(ellipse 900px 600px at 50% 50%, rgba(11,16,32,0.8), transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* Main login container */
  .login-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
    animation: fadeUp 0.8s ease both;
  }

  /* Logo placeholder */
  .login-logo {
    margin-bottom: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo-hex {
    width: 56px;
    height: 56px;
    background: var(--ink);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-hex-inner {
    width: 48px;
    height: 48px;
    background: var(--bg);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-hex-core {
    width: 8px;
    height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 3s ease-in-out infinite;
  }

  .logo-text {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink);
  }

  /* Form */
  .login-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .field-wrap {
    width: 100%;
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    background: var(--bg2);
    transition: border-color 0.25s;
  }

  .field-wrap:focus-within {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red-glow);
  }

  .field-wrap.error {
    border-color: var(--red2);
    animation: shake 0.4s ease;
  }

  .field-prefix {
    padding: 14px 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
    display: flex;
    align-items: center;
    min-width: 100px;
    justify-content: center;
  }

  .field-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.06em;
  }

  .field-input::placeholder {
    color: var(--ink3);
    letter-spacing: 0.04em;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--red);
    border: 1px solid var(--red);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 4px;
  }

  .login-btn:hover {
    background: var(--red2);
    border-color: var(--red2);
    box-shadow: 0 0 20px var(--red-glow);
  }

  .login-btn:active {
    transform: scale(0.99);
  }

  /* Error message */
  .login-error {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red2);
    letter-spacing: 0.06em;
    margin-top: 4px;
    min-height: 18px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .login-error.show {
    opacity: 1;
  }

  /* Tagline */
  .login-tagline {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-top: 8px;
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 32px;
    height: 32px;
    border-color: var(--border);
    border-style: solid;
    z-index: 1;
    opacity: 0.5;
  }
  .corner-tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

  /* Top/bottom bar text */
  .edge-text {
    position: fixed;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink3);
    opacity: 0.4;
    z-index: 1;
  }
  .edge-top { top: 28px; left: 50%; transform: translateX(-50%); }
  .edge-bottom { bottom: 28px; left: 50%; transform: translateX(-50%); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  @media (max-width: 480px) {
    .field-prefix {
      min-width: 80px;
      font-size: 9px;
      padding: 12px 10px;
    }
    .field-input {
      padding: 12px 12px;
      font-size: 12px;
    }
    .edge-text { display: none; }
    .corner { display: none; }
  }
</style>
</head>
<body>

<div class="login-backdrop"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="edge-text edge-top">ROCO Internal Systems — Authorized Personnel Only</div>
<div class="edge-text edge-bottom">&copy; Roach Corporation — All rights reserved</div>

<div class="login-container">

  <div class="login-logo">
    <img src="rocologo.png" alt="ROCO" style="width: 100px;">
    <div class="logo-text">Roach Corporation</div>
  </div>

  <div class="login-form" role="form" aria-label="Employee login">
    <div class="field-wrap" id="idWrap">
      <span class="field-prefix">Employee ID</span>
      <input type="text" class="field-input" id="employeeId" placeholder="Enter ID" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Employee ID">
    </div>
    <div class="field-wrap" id="pwWrap">
      <span class="field-prefix">Password</span>
      <input type="password" class="field-input" id="passwordField" placeholder="Enter password" autocomplete="off" aria-label="Password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Authenticate</button>
    <div class="login-error" id="loginError" role="alert">Access denied — credentials not recognized.</div>
  </div>

  <div class="login-tagline">Elevate. Evolve. Endure.</div>

</div>

<script>
function handleLogin() {
  const empId = document.getElementById('employeeId').value.trim();
  const pw = document.getElementById('passwordField').value.trim();
  const idWrap = document.getElementById('idWrap');
  const pwWrap = document.getElementById('pwWrap');
  const errorEl = document.getElementById('loginError');

  // Clear previous errors
  idWrap.classList.remove('error');
  pwWrap.classList.remove('error');
  errorEl.classList.remove('show');

  if (!empId || !pw) {
    if (!empId) idWrap.classList.add('error');
    if (!pw) pwWrap.classList.add('error');
    errorEl.textContent = 'All fields are required.';
    errorEl.classList.add('show');
    setTimeout(() => {
      idWrap.classList.remove('error');
      pwWrap.classList.remove('error');
    }, 600);
    return;
  }

  // Only one valid credential pair is accepted
  const validId = 'MED-77149';
  const validPassword = 'R0C0PASS';

  if (empId === validId && pw === validPassword) {
    window.location.href = 'home.html';
    return;
  }

  idWrap.classList.add('error');
  pwWrap.classList.add('error');
  errorEl.textContent = 'Access denied — credentials not recognized.';
  errorEl.classList.add('show');
  setTimeout(() => {
    idWrap.classList.remove('error');
    pwWrap.classList.remove('error');
  }, 600);
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', () => {
  const fields = document.querySelectorAll('.field-input');
  fields.forEach(field => {
    field.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  });
});
</script>

</body>
</html>
